<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up - Otis AI Presentation Builder</title>
    <meta name="description" content="Sign up for Otis AI Presentation Builder. Create stunning presentations instantly with AI. Free signup, no credit card required.">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="shortcut icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #7c3aed 50%, #ec4899 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .signup-container {
            background: white;
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
        }

        .signup-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
        }

        .signup-header {
            margin-bottom: 32px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-text h1 {
            font-size: 24px;
            font-weight: 700;
            color: #111827;
            margin: 0;
        }

        .logo-text p {
            font-size: 12px;
            color: #6b7280;
            margin: -2px 0 0 0;
        }

        .signup-title {
            font-size: 32px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
        }

        .signup-subtitle {
            font-size: 16px;
            color: #6b7280;
            font-weight: 400;
        }

        .google-signup-btn {
            width: 100%;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 16px;
            font-weight: 600;
            color: #374151;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
            text-decoration: none;
        }

        .google-signup-btn:hover {
            border-color: #d1d5db;
            background: #f9fafb;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .google-logo {
            width: 20px;
            height: 20px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="%234285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="%2334A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="%23FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="%23EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>') no-repeat center;
            background-size: contain;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #6b7280;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            padding: 0 16px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.2s;
            background: white;
        }

        .form-input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .signin-link {
            text-align: center;
            margin: 24px 0;
            font-size: 14px;
            color: #6b7280;
        }

        .signin-link a {
            color: #8b5cf6;
            text-decoration: none;
            font-weight: 500;
        }

        .signin-link a:hover {
            color: #7c3aed;
            text-decoration: underline;
        }

        .legal-text {
            font-size: 12px;
            color: #6b7280;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .legal-text a {
            color: #8b5cf6;
            text-decoration: none;
        }

        .legal-text a:hover {
            text-decoration: underline;
        }

        .copyright {
            font-size: 12px;
            color: #9ca3af;
        }

        .back-to-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .back-to-home:hover {
            opacity: 0.8;
        }

        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #6b7280;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #e5e7eb;
            border-top: 2px solid #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        .success-message {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                padding: 16px;
                align-items: flex-start;
                padding-top: 40px;
            }

            .signup-container {
                padding: 32px 24px;
                margin: 0;
                border-radius: 20px;
                max-width: 100%;
                box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.25);
            }

            .signup-title {
                font-size: 28px;
                line-height: 1.2;
            }

            .signup-subtitle {
                font-size: 15px;
                line-height: 1.4;
            }

            .back-to-home {
                position: relative;
                top: auto;
                left: auto;
                margin-bottom: 24px;
                color: #6b7280;
                font-size: 14px;
            }

            .logo {
                margin-bottom: 20px;
            }

            .logo-text h1 {
                font-size: 22px;
            }

            .logo-text p {
                font-size: 11px;
            }

            .google-signup-btn {
                padding: 16px 20px;
                font-size: 16px;
                border-radius: 12px;
            }

            .google-logo {
                width: 18px;
                height: 18px;
            }

            .divider {
                margin: 24px 0;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .form-group input {
                padding: 16px 20px;
                font-size: 16px;
                border-radius: 12px;
            }

            .form-group label {
                font-size: 14px;
                margin-bottom: 8px;
            }

            .legal-text {
                font-size: 12px;
                line-height: 1.5;
                margin-top: 20px;
            }

            .copyright {
                font-size: 12px;
                margin-top: 16px;
            }

            .signin-link {
                font-size: 14px;
                margin: 20px 0;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
                padding-top: 20px;
            }

            .signup-container {
                padding: 24px 20px;
                border-radius: 16px;
            }

            .signup-title {
                font-size: 24px;
            }

            .signup-subtitle {
                font-size: 14px;
            }

            .google-signup-btn {
                padding: 14px 16px;
                font-size: 15px;
            }

            .form-group input {
                padding: 14px 16px;
                font-size: 15px;
            }

            .logo-text h1 {
                font-size: 20px;
            }

            .logo-icon img {
                width: 28px;
                height: 28px;
            }
        }

        @media (max-width: 360px) {
            .signup-container {
                padding: 20px 16px;
            }

            .signup-title {
                font-size: 22px;
            }

            .google-signup-btn {
                padding: 12px 14px;
                font-size: 14px;
            }

            .form-group input {
                padding: 12px 14px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <a href="/" class="back-to-home">
        ← Back to Home
    </a>

    <div class="signup-container">
        <div class="signup-header">
            <div class="logo">
                <div class="logo-icon">
                    <img src="favicon.png" alt="Otis Logo" width="32" height="32">
                </div>
                <div class="logo-text">
                    <h1>Otis</h1>
                    <p>AI Presentation Builder</p>
                </div>
            </div>
            <h1 class="signup-title">Sign up</h1>
            <p class="signup-subtitle">Sign up for free. No credit card required.</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <button class="google-signup-btn" onclick="signInWithGoogle()">
            <div class="google-logo"></div>
            <span>Continue with Google</span>
        </button>

        <div class="divider">
            <span>or</span>
        </div>

        <form id="emailSignupForm" onsubmit="handleEmailSignup(event)">
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-input" 
                    placeholder="Enter your email address"
                    required
                >
            </div>

            <button type="submit" class="google-signup-btn" style="background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: white; border: none;">
                <span>Sign up with Email</span>
            </button>
        </form>

        <div class="signin-link">
            Already have an account? <a href="#" onclick="showSignIn()">sign in</a>
        </div>

        <div class="legal-text">
            By signing up for Otis, you acknowledge that you agree to Otis's <a href="terms.html">Terms of service</a> and <a href="privacy.html">Privacy policy</a>.
        </div>

        <div class="copyright">
            @2025 Otis Tech, inc
        </div>
    </div>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
        // Google Sign-In Configuration
        let googleCredentialResponse;

        function initializeGoogleSignIn() {
            google.accounts.id.initialize({
                client_id: '202710867448-oqfu8vetg426vphqb36lqlhiffcasb36.apps.googleusercontent.com',
                callback: handleCredentialResponse,
                auto_select: false,
                cancel_on_tap_outside: true
            });

            // Render the Google Sign-In button
            google.accounts.id.renderButton(
                document.querySelector('.google-signup-btn'),
                {
                    theme: 'outline',
                    size: 'large',
                    width: '100%',
                    text: 'continue_with',
                    shape: 'rectangular'
                }
            );
        }

        function handleCredentialResponse(response) {
            googleCredentialResponse = response;
            
            // Decode the JWT token
            const responsePayload = decodeJwtResponse(response.credential);
            
            console.log('Google Sign-In successful:', responsePayload);
            
            // Show success message
            showMessage('success', 'Successfully signed up with Google! Redirecting...');
            
            // Store user data in localStorage for dashboard
            localStorage.setItem('userName', responsePayload.name);
            localStorage.setItem('userEmail', responsePayload.email);
            localStorage.setItem('otisUserEmail', responsePayload.email);
            localStorage.setItem('otisEmailCaptureDate', new Date().toISOString());
            
            // Store user profile image if available
            if (responsePayload.picture) {
                localStorage.setItem('userPicture', responsePayload.picture);
                localStorage.setItem('userImage', responsePayload.picture);
            }
            
            // Store additional user data
            localStorage.setItem('userFullName', responsePayload.name);
            localStorage.setItem('userGivenName', responsePayload.given_name || '');
            localStorage.setItem('userFamilyName', responsePayload.family_name || '');
            localStorage.setItem('userVerifiedEmail', responsePayload.email_verified ? 'true' : 'false');
            localStorage.setItem('googleSignInDate', new Date().toISOString());
            
            // Track successful signup
            if (typeof trackEvent === 'function') {
                trackEvent('signup_success', {
                    method: 'google',
                    email: responsePayload.email,
                    name: responsePayload.name,
                    has_picture: !!responsePayload.picture
                });
            }
            
            // Here you would typically send the credential to your backend
            // For now, we'll redirect to the dashboard
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 2000);
        }

        function decodeJwtResponse(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        function signInWithGoogle() {
            google.accounts.id.prompt();
        }

        function handleEmailSignup(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const submitBtn = event.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            
            // Show loading state
            submitBtn.innerHTML = '<div class="spinner"></div> <span>Signing up...</span>';
            submitBtn.disabled = true;
            
            // Simulate API call (replace with actual API call)
            setTimeout(() => {
                // Reset button
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                
                // Show success message
                showMessage('success', 'Check your email for verification link!');
                
                // Store user data in localStorage for dashboard
                localStorage.setItem('userName', email.split('@')[0]); // Use email prefix as name
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userPicture', ''); // No picture for email signup
                
                // Here you would typically send the email to your backend
                console.log('Email signup:', email);
                
                // Redirect to dashboard after a delay
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
                
            }, 2000);
        }

        function showMessage(type, message) {
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            // Hide both messages first
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (type === 'error') {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            } else if (type === 'success') {
                successDiv.textContent = message;
                successDiv.style.display = 'block';
            }
        }

        function showSignIn() {
            // For demo purposes, redirect to dashboard
            // In a real app, this would show a sign-in form or redirect to sign-in page
            showMessage('success', 'Signing you in... Redirecting to dashboard...');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 2000);
        }

        // Initialize Google Sign-In when the page loads
        window.onload = function() {
            // Initialize Google Sign-In for all environments
            initializeGoogleSignIn();
        };

        // Analytics tracking
        function trackEvent(eventName, properties = {}) {
            if (typeof gtag !== 'undefined') {
                gtag('event', eventName, properties);
            }
        }

        // Track signup attempts
        document.querySelector('.google-signup-btn').addEventListener('click', function() {
            trackEvent('signup_attempt', {
                method: 'google'
            });
        });

        document.getElementById('emailSignupForm').addEventListener('submit', function() {
            trackEvent('signup_attempt', {
                method: 'email'
            });
        });
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JTDE2HXY86"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-JTDE2HXY86');
    </script>
</body>
</html>
